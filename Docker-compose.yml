version: '3.8'

services:
  postgres-keycloak:
    image: postgres:16
    container_name: postgres-gym-keycloak
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak_pass
    volumes:
      - keycloak-data:/var/lib/postgresql/data
    networks:
      - gym-network

  keycloak:
    image: quay.io/keycloak/keycloak:25.0
    container_name: keycloak-gym-auth
    command: start-dev
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres-keycloak:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak_pass
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HEALTH_ENABLED: "true"
    ports:
      - "8080:8080"
    depends_on:
      - postgres-keycloak
    networks:
      - gym-network
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "exec 3<>/dev/tcp/127.0.0.1/9000 && echo -e 'GET /health/ready HTTP/1.1\r\nhost: localhost\r\nConnection: close\r\n\r\n' >&3 && cat <&3 | grep -q '\"status\": \"UP\"'"
        ]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 30s


  postgres-gym-booking:
    image: postgres:16
    container_name: postgres-gym-booking-db
    environment:
      POSTGRES_DB: gym_booking_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    networks:
      - gym-network


  gym-booking-service:
    build:
      context: ./gym-booking-service
      dockerfile: Dockerfile
    container_name: gym-booking-service
    ports:
      - "8083:8082"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-gym-booking:5432/gym_booking_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: http://keycloak:8080/realms/gym-system
    depends_on:
      postgres-gym-booking:
        condition: service_started
      keycloak:
        condition: service_healthy
    networks:
      - gym-network

networks:
  gym-network:
    driver: bridge

volumes:
  keycloak-data:
